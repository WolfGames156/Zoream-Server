<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Active Users Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="card">
    <h1>Uygulama - Aktif Kullanıcılar</h1>
    <div class="stats">
      <div class="stat">
        <div id="activeCount" class="big">0</div>
        <div class="label">Aktif Kullanıcı</div>
      </div>
      <div class="stat">
        <div id="ipList" class="small">-</div>
        <div class="label">Aktif IP'ler</div>
      </div>
    </div>

    <div class="game-section">
      <h3>Oyun Ekle / Kontrol</h3>
      <input id="appId" placeholder="App ID (ör: 123456)" />
      <button id="checkBtn">Kontrol Et / Gönder</button>
      <div id="gameResult"></div>
    </div>

    <div style="margin-top:12px">
      <small>Client-id localStorage ile tutulur; aynı bilgisayar birden fazla arttırmaz.</small>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
