<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoream Admin</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <!-- Login Overlay -->
  <div id="login-overlay">
    <div class="login-box">
      <h1>Zoream Admin</h1>
      <p style="color: #94a3b8; margin-bottom: 2rem;">Secure Access Required</p>
      <input type="password" id="admin-pass" placeholder="Enter Admin Password">
      <button onclick="attemptLogin()">Login</button>
      <p id="login-error" style="color: var(--danger-color); margin-top: 1rem; display: none;">Invalid Password</p>
    </div>
  </div>

  <div class="container hidden" id="dashboard">
    <header>
      <h1>Zoream Dashboard</h1>
      <button onclick="logout()" class="danger">Logout</button>
    </header>

    <div class="stats-grid">
      <div class="card stat-item">
        <span class="stat-label">Active Users</span>
        <span class="stat-value" id="active-count">0</span>
      </div>
      <div class="card stat-item">
        <span class="stat-label">Total Games</span>
        <span class="stat-value" id="games-count">0</span>
      </div>
      <div class="card stat-item">
        <span class="stat-label">Banned IPs</span>
        <span class="stat-value" id="banned-count">0</span>
      </div>
    </div>

    <div class="card">
      <h2>Active Users</h2>
      <div class="table-container">
        <table id="users-table">
          <thead>
            <tr>
              <th>IP Address</th>
              <th>Last Seen</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <h2>Games Library</h2>
      <div class="table-container">
        <table id="games-table">
          <thead>
            <tr>
              <th>App ID</th>
              <th>Mode</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <h2>Rejected Games</h2>
      <div class="table-container">
        <table id="rejected-table">
          <thead>
            <tr>
              <th>App ID</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <h2>Banned IPs</h2>
      <div class="table-container">
        <table id="banned-table">
          <thead>
            <tr>
              <th>IP Address</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="admin.js"></script>
</body>

</html>
